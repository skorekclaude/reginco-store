<script src="assets/app.js"></script>
<script>
const grid=document.getElementById('grid');
const cards=[...grid.children];
if(cards.length<=8){const lw=document.querySelector('.loadwrap');if(lw)lw.style.display='none';}
function syncCount(){const shown=cards.filter(c=>c.style.display!=='none').length;const e=document.getElementById('empty');if(e)e.hidden=shown>0;const n=document.getElementById('count');if(n)n.textContent=shown;}
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
  document.querySelectorAll('.chip').forEach(x=>{x.classList.remove('on');x.setAttribute('aria-pressed','false');});
  c.classList.add('on');c.setAttribute('aria-pressed','true');
  const f=c.getAttribute('data-filter');
  cards.forEach(card=>{
    const m=(f==='all'||card.getAttribute('data-cat').includes(f));
    card.style.display=m?'':'none';
    if(m){card.classList.remove('show');void card.offsetWidth;card.classList.add('show');}
  });
  syncCount();
}));
document.getElementById('sort').addEventListener('change',e=>{
  const v=e.target.value;
  const sorted=[...cards].sort((a,b)=>{
    const pa=parseFloat(a.getAttribute('data-price')),pb=parseFloat(b.getAttribute('data-price'));
    if(v==='low')return pa-pb; if(v==='high')return pb-pa; return 0;
  });
  sorted.forEach(c=>grid.appendChild(c));
});
</script>
