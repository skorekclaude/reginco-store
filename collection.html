<script>
(function(){
  var grid=document.getElementById('grid');
  var CAT=(window.CATALOG||[]).slice();
  function eur(p){return '€'+Number(p).toFixed(2).replace('.',',');}
  function shortName(t){return t.replace(/\s*[-–]\s*Cepillo.*$/i,'').replace(/\s*[-–]\s*Cepillo/i,'').trim();}
  function card(p){return '<a class="prod" href="product.html?p='+p.h+'" data-cat="'+p.line+'" data-price="'+p.p+'"><div class="ph"><img src="'+p.img+'?width=600" alt="'+shortName(p.t).replace(/"/g,'')+'" loading="lazy"><span class="add" data-i="addcart"></span></div><h4 class="serif">'+shortName(p.t)+'</h4><div class="px">'+eur(p.p)+'</div></a>';}
  var view=CAT.slice();
  function paint(){
    grid.innerHTML=view.map(card).join('');
    var l=document.documentElement.lang||'en';
    grid.querySelectorAll('[data-i]').forEach(function(el){var k=el.getAttribute('data-i');if(typeof T!=='undefined'&&T[l]&&T[l][k]!==undefined)el.innerHTML=T[l][k];});
    var n=document.getElementById('count');if(n)n.textContent=view.length;
    var e=document.getElementById('empty');if(e)e.hidden=view.length>0;
  }
  function apply(){
    var f=document.querySelector('.chip.on').getAttribute('data-filter');
    view=CAT.filter(function(p){return f==='all'||p.line===f;});
    var sv=document.getElementById('sort').value;
    if(sv==='low')view.sort(function(a,b){return Number(a.p)-Number(b.p);});
    else if(sv==='high')view.sort(function(a,b){return Number(b.p)-Number(a.p);});
    paint();
  }
  document.querySelectorAll('.chip').forEach(function(c){c.addEventListener('click',function(){
    document.querySelectorAll('.chip').forEach(function(x){x.classList.remove('on');x.setAttribute('aria-pressed','false');});
    c.classList.add('on');c.setAttribute('aria-pressed','true');apply();
  });});
  document.getElementById('sort').addEventListener('change',apply);
  paint();
  window.collectionRepaint=paint;
  // collhero ambient video gate
  var v=document.querySelector('.collhero .collvid');
  if(v){var rm=matchMedia('(prefers-reduced-motion:reduce)').matches;var sd=navigator.connection&&navigator.connection.saveData;if(rm||sd){v.style.display='none';var fb=document.querySelector('.collhero .bg-fallback');if(fb)fb.style.display='block';}else{var pp=v.play();if(pp&&pp.catch)pp.catch(function(){});}}
})();
</script>
