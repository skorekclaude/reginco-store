<script>
document.querySelectorAll('.thumbs img').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.thumbs img').forEach(x=>x.classList.remove('on'));
  t.classList.add('on');
  const m=document.getElementById('mainimg'),full=t.getAttribute('data-full');
  if(matchMedia('(prefers-reduced-motion:reduce)').matches){m.src=full;}
  else{m.classList.add('swapping');setTimeout(()=>{m.src=full;m.classList.remove('swapping');},180);}
}));
const _bar=document.querySelector('.stickybar'),_buy=document.querySelector('.buyrow');
if(_bar&&_buy&&'IntersectionObserver'in window){new IntersectionObserver(([e])=>_bar.classList.toggle('show',!e.isIntersecting),{rootMargin:'-80px 0px 0px 0px'}).observe(_buy);}
document.querySelectorAll('.opt .row').forEach(row=>row.addEventListener('click',e=>{
  if(e.target.tagName==='BUTTON'){row.querySelectorAll('button').forEach(b=>{b.classList.remove('on');b.setAttribute('aria-pressed','false');});e.target.classList.add('on');e.target.setAttribute('aria-pressed','true');}
}));
const bnbtn=document.getElementById('bnbtn');
if(bnbtn){bnbtn.addEventListener('click',()=>{bnbtn.classList.add('added');const l=document.documentElement.lang||'en';bnbtn.textContent=(typeof T!=='undefined'&&T[l]&&T[l].bn_done)||'✓';});}
const b360=document.getElementById('v360btn'),m360=document.querySelector('.gallery .main'),v360=document.getElementById('v360');
if(b360&&m360&&v360){b360.addEventListener('click',()=>{const on=m360.classList.toggle('is360');b360.classList.toggle('on',on);if(on){v360.load();const p=v360.play();if(p&&p.catch)p.catch(()=>{});}else{v360.pause();}});}
let q=1;const qel=document.getElementById('q');
document.getElementById('plus').onclick=()=>{q++;qel.textContent=q;};
document.getElementById('minus').onclick=()=>{if(q>1){q--;qel.textContent=q;}};
</script>
